version: "3.8"
services:
  db:
    image: postgres:17
    container_name: neon-shop-db
    restart: always
    environment:
      POSTGRES_USER: user_dev
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: neon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
